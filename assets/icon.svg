<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="512" height="512" rx="100" fill="#121212"/>
    
    <defs>
        <linearGradient id="techGradient" x1="100" y1="100" x2="400" y2="400" gradientUnits="userSpaceOnUse">
            <stop stop-color="#00E5FF" />
            <stop offset="1" stop-color="#7B2CBF" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>

    <g filter="url(#glow)">
        
        <path d="M60 256 C 60 160, 100 100, 150 256" stroke="#00E5FF" stroke-width="4" stroke-opacity="0.3" fill="none"/>
        <path d="M452 256 C 452 160, 412 100, 362 256" stroke="#00E5FF" stroke-width="4" stroke-opacity="0.3" fill="none"/>
        
        <path d="M40 256 C 40 120, 90 60, 130 256" stroke="#7B2CBF" stroke-width="4" stroke-opacity="0.2" fill="none"/>
        <path d="M472 256 C 472 120, 422 60, 382 256" stroke="#7B2CBF" stroke-width="4" stroke-opacity="0.2" fill="none"/>

        <path d="M120 280 V 220 C 120 130, 130 90, 256 90 C 382 90, 392 130, 392 220 V 280" 
              stroke="url(#techGradient)" stroke-width="24" stroke-linecap="round" fill="none"/>

        <g transform="translate(166, 150)">
            <path d="M 88 10 C 50 10, 10 40, 10 90 C 10 140, 30 170, 88 170 C 85 170, 85 10, 88 10 Z" 
                  fill="none" stroke="url(#techGradient)" stroke-width="8" stroke-linejoin="round"/>
            <path d="M 92 10 C 130 10, 170 40, 170 90 C 170 140, 150 170, 92 170 C 95 170, 95 10, 92 10 Z" 
                  fill="none" stroke="url(#techGradient)" stroke-width="8" stroke-linejoin="round"/>
            
            <path d="M 45 60 C 55 50, 65 80, 45 100" stroke="url(#techGradient)" stroke-width="6" stroke-linecap="round"/>
            <path d="M 135 60 C 125 50, 115 80, 135 100" stroke="url(#techGradient)" stroke-width="6" stroke-linecap="round"/>
            <path d="M 60 130 C 70 120, 80 140, 60 150" stroke="url(#techGradient)" stroke-width="6" stroke-linecap="round"/>
            <path d="M 120 130 C 110 120, 100 140, 120 150" stroke="url(#techGradient)" stroke-width="6" stroke-linecap="round"/>
        </g>

        <rect x="90" y="240" width="60" height="100" rx="20" fill="#1A1A24" stroke="url(#techGradient)" stroke-width="6"/>
        <rect x="362" y="240" width="60" height="100" rx="20" fill="#1A1A24" stroke="url(#techGradient)" stroke-width="6"/>
        
        <path d="M100 250 V 330" stroke="#333" stroke-width="4" stroke-linecap="round"/>
        <path d="M372 250 V 330" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    </g>
</svg>
