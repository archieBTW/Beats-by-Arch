name: beats_by_arch
description: "Binaural Beat Generator for focus, flow, and deep relaxation"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: ^0.9.39
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.1.21
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.3.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/
